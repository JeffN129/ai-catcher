name: Daily News Auto Updater

on:
  schedule:
    # 定时任务：Cron 表达式使用的是 UTC 时间，北京时间比 UTC 快 8 小时。
    # 0 0 * * * 代表 UTC 的 0点（北京时间早 8 点）
    # 0 12 * * * 代表 UTC 的 12点（北京时间晚 8 点）
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许你在 GitHub 网页上点个按钮手动触发测试

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码仓库
      uses: actions/checkout@v3

    - name: 设置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # 使用稳定的 Python 版本

    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行爬虫与AI总结脚本
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }} # 从 Secrets 中读取密钥
      run: |
        python news_scraper.py # 假设你的执行入口是这个文件

    - name: 提交并推送到 GitHub 仓库
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add daily_news.json
        # 检查文件是否有变动，有变动才提交，防止报错
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update daily news [skip ci]" && git push)
